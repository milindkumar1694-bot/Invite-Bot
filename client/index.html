<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milind &amp; Manvi | Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="ambient-glow"></div>
      <div class="sparkles">
        <span class="sparkle s1"></span>
        <span class="sparkle s2"></span>
        <span class="sparkle s3"></span>
        <span class="sparkle s4"></span>
        <span class="sparkle s5"></span>
        <span class="sparkle s6"></span>
      </div>
      <div class="hearts">
        <span class="heart h1"></span>
        <span class="heart h2"></span>
        <span class="heart h3"></span>
        <span class="heart h4"></span>
        <span class="heart h5"></span>
      </div>

      <main class="card" role="main">
        <p class="label">Milind &amp; Manvi</p>
        <h1 class="title">A Special Invitation</h1>
        <p class="subtitle">
          For the love that keeps growing, let us celebrate the sweetest chapter
          together.
        </p>
        <button id="inviteButton" class="invite-button" type="button">
          Invite
        </button>
        <p id="inviteStatus" class="status" aria-live="polite"></p>

        <section class="chat-panel" aria-label="Private live chat">
          <div class="chat-header">
            <div>
              <p class="chat-title">Private Love Notes</p>
              <p class="chat-subtitle">Temporary chat just for two hearts.</p>
            </div>
            <span id="chatStatus" class="chat-status">Temporary chat</span>
          </div>

          <div class="room-controls">
            <label class="room-label" for="roomCode">Room code</label>
            <div class="room-row">
              <input
                id="roomCode"
                class="room-input"
                type="text"
                inputmode="text"
                placeholder="Enter or share a room code"
                maxlength="32"
              />
              <button id="joinRoomButton" class="room-button" type="button">
                Join
              </button>
            </div>
            <p class="room-hint" id="roomHint">
              Share the same code to connect privately.
            </p>
          </div>

          <div id="chatMessages" class="chat-messages" aria-live="polite"></div>

          <div class="chat-input-area">
            <div class="chat-input-row">
              <input
                id="chatInput"
                class="chat-input"
                type="text"
                placeholder="Write something sweet..."
                maxlength="500"
                disabled
              />
              <button id="sendButton" class="send-button" type="button" disabled>
                Send
              </button>
            </div>

            <div class="chat-actions">
              <label class="upload-button" for="imageUpload">
                Share a photo
              </label>
              <input id="imageUpload" type="file" accept="image/*" disabled />
              <span id="chatHelper" class="chat-helper"></span>
            </div>

            <div id="imagePreview" class="image-preview hidden">
              <img id="previewImage" alt="Selected preview" />
              <div class="preview-actions">
                <button id="sendImageButton" type="button">Send photo</button>
                <button id="cancelImageButton" type="button">Cancel</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
  </body>
</html>
