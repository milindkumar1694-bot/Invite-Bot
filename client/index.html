<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Milind &amp; Manvi | Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page">
      <div class="ambient-glow"></div>
      <div class="sparkles">
        <span class="sparkle s1"></span>
        <span class="sparkle s2"></span>
        <span class="sparkle s3"></span>
        <span class="sparkle s4"></span>
        <span class="sparkle s5"></span>
        <span class="sparkle s6"></span>
      </div>
      <div class="hearts">
        <span class="heart h1"></span>
        <span class="heart h2"></span>
        <span class="heart h3"></span>
        <span class="heart h4"></span>
        <span class="heart h5"></span>
      </div>

      <main class="card" role="main">
        <p class="label">Milind &amp; Manvi</p>
        <h1 class="title">A Special Invitation</h1>
        <p class="subtitle">
          For the love that keeps growing, let us celebrate the sweetest chapter
          together.
        </p>
        <button id="inviteButton" class="invite-button" type="button">
          Invite
        </button>
        <p id="inviteStatus" class="status" aria-live="polite"></p>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
